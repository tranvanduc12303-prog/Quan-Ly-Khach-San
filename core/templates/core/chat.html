<div class="chat-container" style="background: #1a1a1a; color: white; padding: 20px;">
    <h3>Hỗ trợ MyHotel AI</h3>
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="messenger" placeholder="Bạn muốn hỏi gì về phòng?" style="width: 80%;">
        <button type="submit" style="background: #ffc107;">Gửi</button>
    </form>

    {% if answer %}
    <div class="response" style="margin-top: 20px; border-left: 3px solid #ffc107; padding-left: 10px;">
        <p>{{ answer|linebreaks }}</p>
    </div>
    {% endif %}
</div>

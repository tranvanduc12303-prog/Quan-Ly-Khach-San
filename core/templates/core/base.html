<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHotel - Quản Lý Khách Sạn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Montserrat', sans-serif;
        }
        .navbar {
            background-color: #1a1a1a !important;
            border-bottom: 1px solid #333;
            padding: 1rem 0;
        }
        .text-price {
            color: #ffc107 !important; 
            font-weight: bold;
        }
        .btn-yellow {
            background-color: #ffc107 !important;
            border: none !important;
            color: #000 !important;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-yellow:hover {
            background-color: #e0a800 !important;
            transform: scale(1.05);
        }
        /* Style cho các thông báo alert */
        .alert {
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="/" style="color: #ffc107;">MyHotel</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto align-items-center">
                    {% if user.is_authenticated %}
                        <span class="nav-link text-light me-3 small">Chào, <strong>{{ user.username }}</strong></span>
                        
                        <a class="nav-link me-3 fw-bold" href="{% url 'my_bookings' %}" style="color: #ffc107;">
                             <i class="bi bi-calendar-check"></i> Chỗ nghỉ của tôi
                        </a>
                        
                        <form action="{% url 'logout' %}" method="post" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-link nav-link px-0 text-secondary" style="text-decoration: none;">Đăng xuất</button>
                        </form>
                    {% else %}
                        <a class="nav-link me-3" href="{% url 'login' %}">Đăng nhập</a>
                    {% endif %}
                    <a href="/admin/" class="btn btn-outline-warning btn-sm ms-3">Quản Trị</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <main class="py-4">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
